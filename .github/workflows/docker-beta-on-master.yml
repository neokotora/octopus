name: docker-beta-on-master

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-beta-on-master
  cancel-in-progress: true

jobs:
  docker:
    name: Build and push beta docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate beta date tag
        id: vars
        run: |
          DATE_TAG="v$(TZ=Asia/Shanghai date +'%Y.%m.%d')Beta"
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Docker meta (Debian)
        id: meta-debian
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest-beta
            type=raw,value=${{ steps.vars.outputs.date_tag }}

      - name: Docker meta (Alpine)
        id: meta-alpine
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest-beta-alpine
            type=raw,value=${{ steps.vars.outputs.date_tag }}-alpine

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (Debian)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./scripts/dockerfiles/Dockerfile.debian
          push: true
          platforms: linux/amd64,linux/i386,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta-debian.outputs.tags }}
          labels: ${{ steps.meta-debian.outputs.labels }}

      - name: Build and push (Alpine)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./scripts/dockerfiles/Dockerfile.alpine
          push: true
          platforms: linux/amd64,linux/i386,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta-alpine.outputs.tags }}
          labels: ${{ steps.meta-alpine.outputs.labels }}
